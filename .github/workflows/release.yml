# Release pipeline: pushing a tag vX.Y.Z builds the linux-arm64 artifact for
# the Raspberry Pi and publishes a GitHub Release. The Pi's self-updater
# (deploy/update.sh) downloads exactly this artifact.
name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Extract version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Test
        run: dotnet test -c Release

      - name: Publish (linux-arm64, framework-dependent)
        run: >
          dotnet publish src/StabilizatorHub.Web -c Release -r linux-arm64
          --self-contained false
          -p:Version=${{ steps.version.outputs.value }}
          -o publish

      - name: Package artifact
        run: |
          tar -czf stabilizatorhub-linux-arm64.tar.gz -C publish .
          sha256sum stabilizatorhub-linux-arm64.tar.gz > stabilizatorhub-linux-arm64.tar.gz.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            stabilizatorhub-linux-arm64.tar.gz
            stabilizatorhub-linux-arm64.tar.gz.sha256
